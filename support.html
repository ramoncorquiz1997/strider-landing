document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4e90760c-d305-4cc5-838b-2be6d94fc274\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"b3515cef-c242-4344-9f0d-91cb84cb5070\"><\u002Fscript>\n<style>\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}\nbody{margin:0;background:#0d0d0d;}\n::selection{background:#F5A623;color:#0d0d0d;}\n@keyframes glowPulse{0%,100%{opacity:.55;}50%{opacity:.85;}}\n.lp a{color:#F5A623;text-decoration:none;border-bottom:1px solid rgba(245,166,35,0.35);}\n.lp a:hover{border-bottom-color:#F5A623;}\n.lp p{color:#b6b6af;font-size:16px;line-height:1.7;margin:0 0 16px;}\n.lp li{color:#b6b6af;font-size:16px;line-height:1.7;margin:0 0 10px;}\n.lp strong{color:#ECECEA;font-weight:700;}\n.lp h3{color:#ECECEA;font-weight:800;font-size:21px;letter-spacing:-0.01em;margin:0 0 14px;}\n.lp ul{margin:0 0 18px;padding-left:0;list-style:none;}\n.lp ul li{position:relative;padding-left:22px;}\n.lp ul li::before{content:\"\";position:absolute;left:0;top:11px;width:7px;height:7px;background:#F5A623;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ setRoot }}\" style=\"position:relative;width:100%;min-height:100vh;overflow-x:hidden;background:#0d0d0d;color:#ECECEA;font-family:'Archivo',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;\">\n\n  <div style=\"position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(58% 38% at 82% 2%,rgba(245,166,35,0.14),transparent 60%),radial-gradient(48% 34% at 4% 16%,rgba(181,245,58,0.07),transparent 60%);animation:glowPulse 9s ease-in-out infinite;\"><\u002Fdiv>\n\n  <div style=\"position:relative;z-index:1;\">\n\n    <!-- NAV -->\n    <nav style=\"position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);background:rgba(13,13,13,0.78);border-bottom:1px solid #1c1c1c;\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:14px clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n        <button onclick=\"{{ goHome }}\" style=\"cursor:pointer;background:none;border:none;display:flex;align-items:center;gap:11px;padding:0;\">\n          <div style=\"width:26px;height:23px;background:linear-gradient(150deg,#F7B43E,#F5A623);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);\"><\u002Fdiv>\n          <span style=\"font-family:'Archivo';font-weight:900;font-size:20px;letter-spacing:0.02em;color:#ECECEA;\">STRIDER<\u002Fspan>\n        <\u002Fbutton>\n        <div style=\"display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:#0a0a0a;border:1px solid #1f1f1f;border-radius:999px;padding:4px;\">\n          <button data-tab=\"privacy\" onclick=\"{{ goPrivacy }}\" style=\"cursor:pointer;border:none;font-family:'Archivo';font-weight:700;font-size:13.5px;padding:8px 15px;border-radius:999px;background:transparent;color:#9c9c95;white-space:nowrap;\">Privacidad<\u002Fbutton>\n          <button data-tab=\"terms\" onclick=\"{{ goTerms }}\" style=\"cursor:pointer;border:none;font-family:'Archivo';font-weight:700;font-size:13.5px;padding:8px 15px;border-radius:999px;background:transparent;color:#9c9c95;white-space:nowrap;\">Términos<\u002Fbutton>\n          <button data-tab=\"support\" onclick=\"{{ goSupport }}\" style=\"cursor:pointer;border:none;font-family:'Archivo';font-weight:700;font-size:13.5px;padding:8px 15px;border-radius:999px;background:transparent;color:#9c9c95;white-space:nowrap;\">Soporte<\u002Fbutton>\n          <button data-tab=\"contest\" onclick=\"{{ goContest }}\" style=\"cursor:pointer;border:none;font-family:'Archivo';font-weight:700;font-size:13.5px;padding:8px 15px;border-radius:999px;background:transparent;color:#9c9c95;white-space:nowrap;\">Concursos<\u002Fbutton>\n        <\u002Fdiv>\n        <a href=\"/\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:7px;color:#9c9c95;font-weight:700;font-size:13.5px;padding:9px 15px;border:1px solid #2a2a2a;border-radius:999px;\" style-hover=\"border-color:#F5A623;color:#F5A623;\"><i data-lucide=\"arrow-left\" width=\"15\" height=\"15\" style=\"width:15px;height:15px;\"><\u002Fi>Inicio<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <!-- PAGE HEADER -->\n    <header style=\"max-width:1120px;margin:0 auto;padding:clamp(48px,8vw,88px) clamp(16px,4vw,40px) clamp(28px,4vw,44px);\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#F5A623;\">\n        <span style=\"width:18px;height:1px;background:#F5A623;\"><\u002Fspan>{{ eyebrow }}\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Archivo';font-weight:900;font-size:clamp(38px,6.4vw,76px);line-height:0.94;letter-spacing:-0.035em;text-transform:uppercase;margin:18px 0 0;max-width:18ch;\">{{ title }}<\u002Fh1>\n      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px;margin-top:22px;\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:12.5px;color:#7a7a72;letter-spacing:0.02em;\">{{ dateLabel }}<\u002Fspan>\n        <span style=\"width:5px;height:5px;border-radius:50%;background:#333;\"><\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:12.5px;color:#7a7a72;letter-spacing:0.02em;\">México &amp; LATAM<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div style=\"height:1px;max-width:1120px;margin:0 auto;background:#1c1c1c;\"><\u002Fdiv>\n\n    <!-- ===================== PRIVACY ===================== -->\n    <sc-if value=\"{{ isPrivacy }}\" hint-placeholder-val=\"{{ true }}\">\n    <main class=\"lp\" style=\"max-width:820px;margin:0 auto;padding:clamp(40px,6vw,68px) clamp(16px,4vw,40px) clamp(60px,9vw,100px);\">\n      <p style=\"font-size:18px;color:#cfcfc9;\">En Strider tu actividad genera tu mapa. Esta política explica qué datos recopilamos, para qué los usamos y cómo puedes controlarlos.<\u002Fstrong>.<\u002Fp>\n\n      <section style=\"margin-top:42px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">01<\u002Fdiv>\n        <h3>Información que recopilamos<\u002Fh3>\n        <ul>\n          <li><strong>Ubicación GPS<\u002Fstrong> — permanece activa durante tus sesiones de actividad para registrar tu ruta en tiempo real.<\u002Fli>\n          <li><strong>Datos de salud y fitness<\u002Fstrong> — distancia, ritmo y frecuencia cardíaca de cada sesión.<\u002Fli>\n          <li><strong>Datos de cuenta<\u002Fstrong> — nombre de usuario, correo electrónico y foto de perfil.<\u002Fli>\n          <li><strong>Datos de uso<\u002Fstrong> — cómo interactúas con la app para mejorar la experiencia.<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">02<\u002Fdiv>\n        <h3>Cómo usamos tus datos<\u002Fh3>\n        <ul>\n          <li>Los <strong>datos de ubicación<\u002Fstrong> se usan para registrar tus rutas y capturar hexágonos territoriales en el mapa.<\u002Fli>\n          <li>Las <strong>notificaciones push<\u002Fstrong> se usan para enviarte alertas de conquista territorial, likes y actividad social.<\u002Fli>\n          <li>Los datos de salud y actividad alimentan tus estadísticas, replays y posición en la tabla.<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">03<\u002Fdiv>\n        <h3>Terceros con los que trabajamos<\u002Fh3>\n        <p>Strider se apoya en proveedores de confianza para funcionar. Cada uno procesa únicamente los datos necesarios para prestar su servicio:<\u002Fp>\n        <ul>\n          <li><strong>Supabase<\u002Fstrong> — base de datos y autenticación de cuentas.<\u002Fli>\n          <li><strong>RevenueCat<\u002Fstrong> — gestión de suscripciones y compras.<\u002Fli>\n          <li><strong>Expo<\u002Fstrong> — entrega de notificaciones push.<\u002Fli>\n          <li><strong>Apple HealthKit<\u002Fstrong> — lectura de datos de actividad física.<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">04<\u002Fdiv>\n        <h3>No vendemos tus datos<\u002Fh3>\n        <p>Strider <strong>no vende tus datos personales a terceros<\u002Fstrong> bajo ninguna circunstancia. Tu actividad es tuya.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">05<\u002Fdiv>\n        <h3>Retención y eliminación de datos<\u002Fh3>\n        <p>Conservamos tus datos mientras tu cuenta esté activa. Tienes derecho a <strong>eliminar tu cuenta y todos tus datos directamente desde la app<\u002Fstrong> en cualquier momento. Al borrar tu cuenta, tus datos personales se eliminan de nuestros sistemas.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">06<\u002Fdiv>\n        <h3>Alcance regional<\u002Fh3>\n        <p>Esta política aplica para usuarios en <strong>México y Latinoamérica<\u002Fstrong>.<\u002Fp>\n      <\u002Fsection>\n\n      <div style=\"margin-top:46px;background:#141414;border:1px solid #232323;border-radius:20px;padding:28px;\">\n        <h3 style=\"margin-bottom:8px;\">¿Dudas sobre privacidad?<\u002Fh3>\n        <p style=\"margin:0;\">Escríbenos a <a href=\"mailto:hola@strider.lat\">hola@strider.lat<\u002Fa> y te ayudamos.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fmain>\n    <\u002Fsc-if>\n\n    <!-- ===================== TERMS ===================== -->\n    <sc-if value=\"{{ isTerms }}\" hint-placeholder-val=\"{{ false }}\">\n    <main class=\"lp\" style=\"max-width:820px;margin:0 auto;padding:clamp(40px,6vw,68px) clamp(16px,4vw,40px) clamp(60px,9vw,100px);\">\n      <p style=\"font-size:18px;color:#cfcfc9;\">Al descargar y usar Strider aceptas estos términos. Léelos con atención — definen las reglas de uso de la app y de las suscripciones Strider Pro.<\u002Fp>\n\n      <section style=\"margin-top:42px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">01<\u002Fdiv>\n        <h3>Acuerdo de licencia (EULA)<\u002Fh3>\n        <p>El uso de Strider se rige por el <strong>Contrato de Licencia de Usuario Final (EULA) estándar de Apple<\u002Fstrong>, disponible en: <a href=\"https://www.apple.com/legal/internet-services/itunes/dev/stdeula/\" target=\"_blank\" rel=\"noopener\">apple.com/legal/internet-services/itunes/dev/stdeula<\u002Fa>.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">02<\u002Fdiv>\n        <h3>Suscripciones Strider Pro<\u002Fh3>\n        <ul>\n          <li>Ofrecemos suscripciones <strong>auto-renovables<\u002Fstrong>: <strong>Strider Pro Mensual<\u002Fstrong> y <strong>Strider Pro Anual<\u002Fstrong>.<\u002Fli>\n          <li>Todos los cobros se procesan a través de tu cuenta de <strong>Apple App Store<\u002Fstrong>.<\u002Fli>\n          <li>La suscripción se renueva automáticamente al final de cada periodo, salvo que se cancele antes.<\u002Fli>\n        <\u002Ful>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">03<\u002Fdiv>\n        <h3>Cómo cancelar<\u002Fh3>\n        <p>Puedes cancelar tu suscripción en cualquier momento desde tu iPhone: <strong>Configuración → [tu nombre] → Suscripciones → Strider<\u002Fstrong>. La cancelación surte efecto al final del periodo de facturación vigente.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">04<\u002Fdiv>\n        <h3>Uso aceptable<\u002Fh3>\n        <p>Queda <strong>prohibido usar Strider para actividades ilegales o peligrosas<\u002Fstrong>. Te comprometes a usar la app de forma responsable y conforme a la ley.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">05<\u002Fdiv>\n        <h3>Tu seguridad es tu responsabilidad<\u002Fh3>\n        <p>El <strong>usuario es el único responsable de su seguridad física<\u002Fstrong> durante el uso de la app. Mantente atento a tu entorno, respeta las señales de tránsito y nunca pongas en riesgo tu integridad por capturar territorio.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">06<\u002Fdiv>\n        <h3>Precisión del GPS<\u002Fh3>\n        <p>Strider <strong>no garantiza la precisión del GPS en todas las condiciones<\u002Fstrong>. La señal puede variar por factores ambientales, de hardware o de cobertura. Las distancias y rutas registradas son aproximaciones.<\u002Fp>\n      <\u002Fsection>\n\n      <div style=\"margin-top:46px;background:#141414;border:1px solid #232323;border-radius:20px;padding:28px;\">\n        <h3 style=\"margin-bottom:8px;\">¿Preguntas sobre los términos?<\u002Fh3>\n        <p style=\"margin:0;\">Contáctanos en <a href=\"mailto:hola@strider.lat\">hola@strider.lat<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fmain>\n    <\u002Fsc-if>\n\n    <!-- ===================== SUPPORT ===================== -->\n    <sc-if value=\"{{ isSupport }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:1000px;margin:0 auto;padding:clamp(40px,6vw,68px) clamp(16px,4vw,40px) clamp(60px,9vw,100px);\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(28px,4vw,56px);align-items:start;\">\n\n        <div>\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#B5F53A;\">\n            <span style=\"width:18px;height:1px;background:#B5F53A;\"><\u002Fspan>Preguntas frecuentes\n          <\u002Fdiv>\n          <div style=\"margin-top:22px;display:flex;flex-direction:column;gap:12px;\">\n            <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"5\">\n              <div style=\"background:#141414;border:1px solid {{ f.border }};border-radius:16px;overflow:hidden;\">\n                <button onclick=\"{{ f.toggle }}\" style=\"cursor:pointer;width:100%;background:none;border:none;display:flex;align-items:center;justify-content:space-between;gap:14px;text-align:left;padding:18px 20px;\">\n                  <span style=\"font-family:'Archivo';font-weight:700;font-size:16px;color:#ECECEA;line-height:1.35;\">{{ f.q }}<\u002Fspan>\n                  <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:{{ f.iconBg }};display:flex;align-items:center;justify-content:center;color:{{ f.iconFg }};\"><i data-lucide=\"{{ f.icon }}\" width=\"15\" height=\"15\" style=\"width:15px;height:15px;\"><\u002Fi><\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:0 20px 20px;color:#a9a9a2;font-size:15px;line-height:1.65;\">{{ f.a }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position:sticky;top:90px;\">\n          <div style=\"background:linear-gradient(165deg,#16160f,#121212);border:1px solid #2a2a2a;border-radius:22px;padding:clamp(24px,3vw,32px);\">\n            <h3 style=\"font-family:'Archivo';font-weight:800;font-size:22px;color:#ECECEA;margin:0 0 6px;letter-spacing:-0.01em;\">Contáctanos<\u002Fh3>\n            <p style=\"font-family:'Space Mono',monospace;font-size:12px;color:#7a7a72;margin:0 0 22px;letter-spacing:0.02em;\">Respuesta en 24–48 horas hábiles<\u002Fp>\n            <form onsubmit=\"{{ sendEmail }}\" style=\"display:flex;flex-direction:column;gap:14px;\">\n              <input value=\"{{ cName }}\" oninput=\"{{ onCName }}\" type=\"text\" placeholder=\"Tu nombre\" style=\"font-family:'Archivo';font-size:15px;color:#ECECEA;background:#0c0c0c;border:1px solid #2a2a2a;border-radius:12px;padding:13px 15px;outline:none;\" style-focus=\"border-color:#F5A623;\">\n              <input value=\"{{ cEmail }}\" oninput=\"{{ onCEmail }}\" type=\"email\" placeholder=\"tucorreo@email.com\" style=\"font-family:'Archivo';font-size:15px;color:#ECECEA;background:#0c0c0c;border:1px solid #2a2a2a;border-radius:12px;padding:13px 15px;outline:none;\" style-focus=\"border-color:#F5A623;\">\n              <textarea value=\"{{ cMessage }}\" oninput=\"{{ onCMessage }}\" rows=\"4\" placeholder=\"¿En qué te ayudamos?\" style=\"font-family:'Archivo';font-size:15px;color:#ECECEA;background:#0c0c0c;border:1px solid #2a2a2a;border-radius:12px;padding:13px 15px;outline:none;resize:vertical;min-height:108px;\" style-focus=\"border-color:#F5A623;\"><\u002Ftextarea>\n              <button type=\"submit\" style=\"font-family:'Archivo';cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:9px;background:#F5A623;color:#0d0d0d;font-weight:800;font-size:15px;padding:15px;border-radius:13px;\" style-hover=\"background:#FFB838;\">Enviar correo <i data-lucide=\"send\" width=\"16\" height=\"16\" style=\"width:16px;height:16px;\"><\u002Fi><\u002Fbutton>\n            <\u002Fform>\n            <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:#B5F53A;font-weight:600;margin:14px 0 0;justify-content:center;\"><i data-lucide=\"check-circle-2\" width=\"15\" height=\"15\" style=\"width:15px;height:15px;\"><\u002Fi>¡Mensaje enviado! Te respondemos en 24–48 horas hábiles.<\u002Fp>\n            <\u002Fsc-if>\n            <div style=\"height:1px;background:#252525;margin:22px 0;\"><\u002Fdiv>\n            <a href=\"mailto:hola@strider.lat\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:11px;color:#ECECEA;font-weight:600;font-size:15px;\" style-hover=\"color:#F5A623;\"><span style=\"width:38px;height:38px;border-radius:11px;background:rgba(245,166,35,0.14);display:flex;align-items:center;justify-content:center;color:#F5A623;flex:none;\"><i data-lucide=\"mail\" width=\"18\" height=\"18\" style=\"width:18px;height:18px;\"><\u002Fi><\u002Fspan>hola@strider.lat<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n    <\u002Fsc-if>\n\n    <!-- ===================== CONTEST RULES ===================== -->\n    <sc-if value=\"{{ isContest }}\" hint-placeholder-val=\"{{ false }}\">\n    <main class=\"lp\" style=\"max-width:820px;margin:0 auto;padding:clamp(40px,6vw,68px) clamp(16px,4vw,40px) clamp(60px,9vw,100px);\">\n      <p style=\"font-size:18px;color:#cfcfc9;\">Estas son las reglas oficiales que rigen los retos y concursos dentro de Strider. Al participar, aceptas estas condiciones en su totalidad.<\u002Fp>\n\n      <section style=\"margin-top:42px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">01<\u002Fdiv>\n        <h3>Naturaleza de los retos<\u002Fh3>\n        <p>Los retos de Strider son <strong>competencias de actividad física<\u002Fstrong> basadas en kilómetros recorridos o en hexágonos territoriales conquistados durante el periodo de cada reto.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">02<\u002Fdiv>\n        <h3>Premios<\u002Fh3>\n        <p>Los premios pueden ser <strong>productos físicos<\u002Fstrong> (tenis, ropa deportiva, accesorios) o <strong>premios en efectivo<\u002Fstrong>, según se anuncie específicamente en cada reto.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">03<\u002Fdiv>\n        <h3>Elegibilidad<\u002Fh3>\n        <p>Para participar debes ser <strong>usuario registrado en Strider Pro<\u002Fstrong> y ser <strong>mayor de 18 años<\u002Fstrong>.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">04<\u002Fdiv>\n        <h3>Determinación de ganadores<\u002Fh3>\n        <p>Los ganadores se determinan por <strong>clasificación objetiva<\u002Fstrong> — el total de kilómetros recorridos o de hexágonos conquistados al cierre del periodo del reto.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">05<\u002Fdiv>\n        <h3>Descalificación<\u002Fh3>\n        <p>Strider se reserva el derecho de <strong>descalificar a cualquier participante por uso fraudulento, trampa<\u002Fstrong> o manipulación de los datos de actividad.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">06<\u002Fdiv>\n        <h3>Condiciones de los premios<\u002Fh3>\n        <p>Los premios <strong>no son transferibles ni canjeables por efectivo<\u002Fstrong>, salvo que se indique expresamente lo contrario en las bases de cada reto.<\u002Fp>\n      <\u002Fsection>\n\n      <div style=\"margin-top:42px;background:rgba(245,166,35,0.07);border:1px solid rgba(245,166,35,0.35);border-radius:20px;padding:26px 28px;\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;\">\n          <i data-lucide=\"info\" width=\"18\" height=\"18\" style=\"width:18px;height:18px;color:#F5A623;\"><\u002Fi>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;color:#F5A623;\">Aviso obligatorio<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:0;color:#e6e1d6;font-size:16px;line-height:1.7;\">Este concurso no está patrocinado, avalado, administrado ni asociado de ninguna manera con Apple Inc. Apple no es responsable de ningún aspecto de este concurso.<\u002Fp>\n      <\u002Fdiv>\n\n      <section style=\"margin-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;letter-spacing:0.08em;margin-bottom:10px;\">07<\u002Fdiv>\n        <h3>Ley aplicable<\u002Fh3>\n        <p>Estos retos y concursos se rigen por las <strong>leyes de los Estados Unidos Mexicanos<\u002Fstrong>.<\u002Fp>\n      <\u002Fsection>\n\n      <div style=\"margin-top:42px;background:#141414;border:1px solid #232323;border-radius:20px;padding:28px;\">\n        <h3 style=\"margin-bottom:8px;\">¿Dudas sobre un concurso?<\u002Fh3>\n        <p style=\"margin:0;\">Escríbenos a <a href=\"mailto:hola@strider.lat\">hola@strider.lat<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fmain>\n    <\u002Fsc-if>\n\n    <!-- FOOTER -->\n    <footer style=\"background:#0a0a0a;border-top:1px solid #1c1c1c;\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:clamp(44px,6vw,64px) clamp(16px,4vw,40px) 36px;\">\n        <div style=\"display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:28px;\">\n          <div style=\"max-width:320px;\">\n            <div style=\"display:flex;align-items:center;gap:11px;\">\n              <div style=\"width:24px;height:21px;background:linear-gradient(150deg,#F7B43E,#F5A623);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);\"><\u002Fdiv>\n              <span style=\"font-family:'Archivo';font-weight:900;font-size:18px;\">STRIDER<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"color:#9c9c95;font-size:14px;line-height:1.6;margin:14px 0 0;\">Tu ciudad. Tu territorio. La app de running con conquista territorial, hecha para corredores.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:clamp(40px,8vw,80px);flex-wrap:wrap;\">\n            <div>\n              <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#5e5e58;margin-bottom:16px;\">Legal<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:11px;\">\n                <button data-foot=\"privacy\" onclick=\"{{ goPrivacy }}\" style=\"cursor:pointer;background:none;border:none;text-align:left;padding:0;font-family:'Archivo';font-weight:600;font-size:14px;color:#b6b6af;\" style-hover=\"color:#F5A623;\">Privacidad<\u002Fbutton>\n                <button data-foot=\"terms\" onclick=\"{{ goTerms }}\" style=\"cursor:pointer;background:none;border:none;text-align:left;padding:0;font-family:'Archivo';font-weight:600;font-size:14px;color:#b6b6af;\" style-hover=\"color:#F5A623;\">Términos<\u002Fbutton>\n                <button data-foot=\"support\" onclick=\"{{ goSupport }}\" style=\"cursor:pointer;background:none;border:none;text-align:left;padding:0;font-family:'Archivo';font-weight:600;font-size:14px;color:#b6b6af;\" style-hover=\"color:#F5A623;\">Soporte<\u002Fbutton>\n                <button data-foot=\"contest\" onclick=\"{{ goContest }}\" style=\"cursor:pointer;background:none;border:none;text-align:left;padding:0;font-family:'Archivo';font-weight:600;font-size:14px;color:#b6b6af;\" style-hover=\"color:#F5A623;\">Concursos<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#5e5e58;margin-bottom:16px;\">Contacto<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:13px;\">\n                <a href=\"mailto:hola@strider.lat\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;color:#b6b6af;font-size:14px;font-weight:600;\" style-hover=\"color:#F5A623;\"><i data-lucide=\"mail\" width=\"16\" height=\"16\" style=\"width:16px;height:16px;\"><\u002Fi>hola@strider.lat<\u002Fa>\n                <a href=\"https://instagram.com/strider.lat\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;color:#b6b6af;font-size:14px;font-weight:600;\" style-hover=\"color:#F5A623;\"><i data-lucide=\"camera\" width=\"16\" height=\"16\" style=\"width:16px;height:16px;\"><\u002Fi>@strider.lat<\u002Fa>\n                <a href=\"https://strider.lat\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;color:#b6b6af;font-size:14px;font-weight:600;\" style-hover=\"color:#F5A623;\"><i data-lucide=\"globe\" width=\"16\" height=\"16\" style=\"width:16px;height:16px;\"><\u002Fi>strider.lat<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:#1c1c1c;margin:36px 0 24px;\"><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;\">\n          <p style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;margin:0;letter-spacing:0.03em;\">© 2026 Strider<\u002Fp>\n          <p style=\"font-family:'Space Mono',monospace;font-size:12px;color:#5e5e58;margin:0;letter-spacing:0.03em;\">Hecho para corredores.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:880},&quot;defaultPage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Privacidad&quot;,&quot;Términos&quot;,&quot;Soporte&quot;,&quot;Concursos&quot;],&quot;default&quot;:&quot;Privacidad&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const map = { 'Privacidad': 'privacy', 'Términos': 'terms', 'Soporte': 'support', 'Concursos': 'contest' };\n    this.state = {\n      page: this.pageFromPath() || this.pageFromHash() || map[props.defaultPage] || 'privacy',\n      openFaq: 0,\n      contact: { name: '', email: '', message: '' },\n      sent: false,\n      sending: false,\n    };\n  }\n\n  pageFromHash() {\n    const valid = ['privacy', 'terms', 'support', 'contest'];\n    const aliases = { 'contest-rules': 'contest', 'privacidad': 'privacy', 'terminos': 'terms', 'soporte': 'support', 'concursos': 'contest' };\n    let h = (window.location.hash || '').replace('#', '').toLowerCase();\n    h = aliases[h] || h;\n    return valid.includes(h) ? h : null;\n  }\n\n  pageFromPath() {\n    const p = (window.location.pathname || '').toLowerCase();\n    if (p.includes('contest') || p.includes('concurso')) return 'contest';\n    if (p.includes('term')) return 'terms';\n    if (p.includes('support') || p.includes('soporte') || p.includes('ayuda')) return 'support';\n    if (p.includes('privac')) return 'privacy';\n    return null;\n  }\n\n  setRoot = (el) => { this.rootEl = el; };\n\n  go = (page) => {\n    this.setState({ page, sent: false });\n    const slug = { privacy: '/privacy', terms: '/terms', support: '/support', contest: '/contest-rules' }[page] || '/';\n    try { window.history.pushState(null, '', slug); } catch (e) {}\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  };\n  goHome = () => { window.location.href = '/'; };\n\n  toggleFaq = (i) => { this.setState((s) => ({ openFaq: s.openFaq === i ? -1 : i })); };\n\n  updateContact = (key, val) => {\n    this.setState((s) => ({ contact: { ...s.contact, [key]: val }, sent: false }));\n  };\n\n  sendEmail = async (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    const { name, email, message } = this.state.contact;\n    if (!name || !email || !message) return;\n    this.setState({ sending: true, sent: false });\n    try {\n      const res = await fetch('/api/support', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({ name, email, message }),\n      });\n      if (res.ok) {\n        this.setState({ sent: true, sending: false, contact: { name: '', email: '', message: '' } });\n      } else {\n        this.setState({ sending: false });\n        alert('Hubo un error al enviar. Esc\u00edbe\u00ednos directo a hola@strider.lat');\n      }\n    } catch (err) {\n      this.setState({ sending: false });\n      alert('Hubo un error al enviar. Esc\u00edbe\u00ednos directo a hola@strider.lat');\n    }\n  };\n\n  componentDidMount() {\n    this.refreshIcons();\n    this.applyActive();\n    this._onNav = () => { const p = this.pageFromPath() || this.pageFromHash(); if (p && p !== this.state.page) this.setState({ page: p, sent: false }); };\n    window.addEventListener('hashchange', this._onNav);\n    window.addEventListener('popstate', this._onNav);\n  }\n  componentWillUnmount() {\n    if (this._onNav) { window.removeEventListener('hashchange', this._onNav); window.removeEventListener('popstate', this._onNav); }\n  }\n  componentDidUpdate() { this.refreshIcons(); this.applyActive(); }\n\n  applyActive() {\n    const root = this.rootEl || document;\n    const page = this.state.page;\n    root.querySelectorAll('[data-tab]').forEach((b) => {\n      const on = b.getAttribute('data-tab') === page;\n      b.style.background = on ? '#F5A623' : 'transparent';\n      b.style.color = on ? '#0d0d0d' : '#9c9c95';\n    });\n    root.querySelectorAll('[data-foot]').forEach((b) => {\n      b.style.color = b.getAttribute('data-foot') === page ? '#F5A623' : '#b6b6af';\n    });\n  }\n\n  refreshIcons(attempt = 0) {\n    if (window.lucide && typeof window.lucide.createIcons === 'function') {\n      try { window.lucide.createIcons(); } catch (e) {}\n    } else if (attempt < 60) {\n      setTimeout(() => this.refreshIcons(attempt + 1), 120);\n    }\n  }\n\n  renderVals() {\n    const page = this.state.page;\n\n    const headers = {\n      privacy: { eyebrow: 'Política de Privacidad', title: 'Tu actividad, tus datos', dateLabel: 'Vigente desde junio de 2025' },\n      terms: { eyebrow: 'Términos de Uso', title: 'Las reglas del juego', dateLabel: 'Última actualización: junio de 2025' },\n      support: { eyebrow: 'Centro de Ayuda', title: 'Centro de Ayuda Strider', dateLabel: 'Respuesta en 24–48 h hábiles' },\n      contest: { eyebrow: 'Reglas de Concursos', title: 'Reglas oficiales de retos y concursos', dateLabel: 'Última actualización: junio de 2025' },\n    };\n    const h = headers[page];\n\n    const faqData = [\n      { q: '¿Cómo cancelo mi suscripción?', a: 'Desde tu iPhone, ve a Configuración → [tu nombre] → Suscripciones → Strider y selecciona cancelar. Seguirás teniendo acceso Pro hasta el final del periodo pagado.' },\n      { q: '¿Cómo elimino mi cuenta?', a: 'Abre la app y ve a Perfil → Eliminar cuenta. Esto borra tu cuenta y todos tus datos de forma permanente.' },\n      { q: '¿Por qué la app necesita mi ubicación?', a: 'Strider usa tu ubicación para registrar tus rutas en tiempo real y conquistar los hexágonos territoriales del mapa. Sin ubicación, no podemos trazar tu actividad.' },\n      { q: '¿Cómo restauro mis compras?', a: 'En la pantalla Pro, toca el botón \"Restaurar compras\". Tu suscripción activa se reactivará en este dispositivo.' },\n      { q: '¿Cómo contacto a soporte?', a: 'Usa el formulario de esta página o escríbenos directamente a hola@strider.lat. Respondemos en 24–48 horas hábiles.' },\n    ];\n    const faqs = faqData.map((f, i) => {\n      const open = this.state.openFaq === i;\n      return {\n        key: 'faq' + i,\n        q: f.q,\n        a: f.a,\n        open,\n        icon: open ? 'minus' : 'plus',\n        iconBg: open ? '#F5A623' : 'rgba(245,166,35,0.14)',\n        iconFg: open ? '#0d0d0d' : '#F5A623',\n        border: open ? 'rgba(245,166,35,0.4)' : '#232323',\n        toggle: () => this.toggleFaq(i),\n      };\n    });\n\n    return {\n      goPrivacy: () => this.go('privacy'),\n      goTerms: () => this.go('terms'),\n      goSupport: () => this.go('support'),\n      goContest: () => this.go('contest'),\n      eyebrow: h.eyebrow,\n      title: h.title,\n      dateLabel: h.dateLabel,\n      isPrivacy: page === 'privacy',\n      isTerms: page === 'terms',\n      isSupport: page === 'support',\n      isContest: page === 'contest',\n      faqs,\n      cName: this.state.contact.name,\n      cEmail: this.state.contact.email,\n      cMessage: this.state.contact.message,\n      onCName: (e) => this.updateContact('name', e.target.value),\n      onCEmail: (e) => this.updateContact('email', e.target.value),\n      onCMessage: (e) => this.updateContact('message', e.target.value),\n      sendEmail: this.sendEmail,\n      sent: this.state.sent,\n      setRoot: this.setRoot,\n      goHome: this.goHome,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
